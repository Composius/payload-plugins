name: Publish to npm

# Publishes one package per run. Trigger with either:
#  - a git tag `<short-name>@<version>` (e.g. `articles@1.0.5`, `menus@0.1.0`)
#  - manual dispatch, choosing the package (publishes its current package.json version)
on:
  push:
    tags:
      - "*@*"
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        type: choice
        required: true
        options:
          - articles
          - menus
          - pages

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Resolve package
        id: resolve
        env:
          PUSH_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          DISPATCH_PACKAGE: ${{ inputs.package }}
        run: |
          if [ -n "$DISPATCH_PACKAGE" ]; then
            SHORT="$DISPATCH_PACKAGE"
          else
            case "$PUSH_TAG" in
              *@*) SHORT="${PUSH_TAG%%@*}" ;;
              *)
                echo "Tag '$PUSH_TAG' must be '<package>@<version>' (e.g. articles@1.0.5)"
                exit 1
                ;;
            esac
          fi
          DIR="packages/payload-plugin-$SHORT"
          if [ ! -f "$DIR/package.json" ]; then
            echo "Unknown package '$SHORT' ($DIR/package.json not found)"
            exit 1
          fi
          if [ -n "$PUSH_TAG" ]; then
            TAG_VERSION="${PUSH_TAG#*@}"
            PKG_VERSION="$(jq -r .version "$DIR/package.json")"
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "Tag version '$TAG_VERSION' does not match $DIR/package.json version '$PKG_VERSION'"
              exit 1
            fi
          fi
          echo "name=@vitrailweb/payload-plugin-$SHORT" >> "$GITHUB_OUTPUT"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm vitest run "${{ steps.resolve.outputs.dir }}/test"

      - name: Build
        run: pnpm --filter "${{ steps.resolve.outputs.name }}" build

      - name: Publish
        run: pnpm --filter "${{ steps.resolve.outputs.name }}" publish --access public --no-git-checks
